name: CI/CD Tests for core-service

on:
  workflow_call:
  pull_request:
    branches: [main, dev]

jobs:
  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and run docker-compose
        run: |
          docker compose -f docker-compose.test.yml --profile acceptance build
          docker compose -f docker-compose.test.yml up -d --remove-orphans

      - name: Show running containers
        run: |
          docker ps -a

      - name: Run unit tests
        run: |
          docker compose -f docker-compose.test.yml exec -T app sh run_tests.sh

      - name: Run acceptance tests
        run: |
          docker compose -f docker-compose.test.yml --profile acceptance run --rm python-tests
