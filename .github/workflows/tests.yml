name: CI/CD Tests for core-service

on:
  workflow_call:
  pull_request:
    branches: [main, dev]

jobs:
  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services for acceptance tests
        run: |
          docker compose -f docker-compose.test.yml up -d --remove-orphans

      - name: Run acceptance tests
        run: |
          docker compose -f docker-compose.test.yml --profile acceptance run --rm python-tests

      - name: Run unit tests
        run: |
          docker compose -f docker-compose.test.yml run --rm app sh run_tests.sh

      - name: DEBUG - coverage file check
        run: cat ./coverage/coverage.out || echo "coverage.out not found"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage.out
          fail_ci_if_error: true
