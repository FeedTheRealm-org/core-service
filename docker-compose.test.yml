services:
  app:
    build:
      context: .
      target: test
    tty: true
    ports:
      - "8000:8000"
    environment:
      - SERVER_ENVIRONMENT=testing
      - DATABASE_URL=postgresql://postgres:postgres@test_db:5432/postgres
      - DB_SHOULD_MIGRATE=true
      - SESSION_TOKEN_SECRET_KEY=test_secret_key
      - SESSION_TOKEN_DURATION=1h
    depends_on:
      test_db:
        condition: service_healthy
    networks:
      - app-network

  python-tests:
    build:
      context: ./tests
      dockerfile: Dockerfile
    environment:
      - APP_BASE_URL=http://app:8000
    depends_on:
      - app
    networks:
      - app-network
    profiles:
      - acceptance

  test_db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge
