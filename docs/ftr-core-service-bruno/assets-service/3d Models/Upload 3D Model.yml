info:
  name: Upload 3D Model
  type: http
  seq: 16
  tags:
    - assets-service

http:
  method: PUT
  url: "{{baseUrl}}/assets/models/world/:world_id"
  params:
    - name: world_id
      value: 00000000-0000-0000-0000-000000000000
      type: path
      description: World UUID
  body:
    type: multipart-form
    data:
      - name: model_id
        type: text
        value: 666a2e98-24c8-47b4-b50a-b6b77a916f04
      - name: model_file
        type: file
        value:
          - /home/sev/Downloads/rubiks_cube.glb
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

