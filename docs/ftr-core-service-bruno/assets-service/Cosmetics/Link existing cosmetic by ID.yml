info:
  name: Link existing cosmetic by ID
  type: http
  seq: 1
  tags:
    - assets-service

http:
  method: PUT
  url: "{{baseUrl}}/assets/cosmetics/categories/:id/sprites/:sprite_id"
  params:
    - name: id
      value: ""
      type: path
      description: Category UUID
    - name: sprite_id
      value: ""
      type: path
      description: Existing Sprite UUID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

