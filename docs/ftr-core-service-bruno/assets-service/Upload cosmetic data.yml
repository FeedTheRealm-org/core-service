info:
  name: Upload cosmetic data
  type: http
  seq: 6
  tags:
    - assets-service

http:
  method: PUT
  url: "{{baseUrl}}/assets/cosmetics/categories/:category_id"
  params:
    - name: "category_id"
      value: "635b53d3-7a10-44e3-8d4e-c47cfd7fdb15"
      type: path
  body:
    type: multipart-form
    data:
      - name: world_id
        type: text
        value: e160ac19-d574-4d49-82ec-6044a100ae29
        contentType: string
      - name: price
        type: text
        value: "0"
      - name: sprite
        type: file
        value:
          - "path/to/sprite.png"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    description: Created
    request:
      url: "{{baseUrl}}/assets/cosmetics/categories/:category_id"
      method: PUT
    response:
      status: 201
      statusText: Created
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/assets/cosmetics/categories/:category_id"
      method: PUT
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/assets/cosmetics/categories/:category_id"
      method: PUT
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
