info:
  name: Get cosmetics categories
  type: http
  seq: 3
  tags:
    - assets-service

http:
  method: GET
  url: "{{baseUrl}}/assets/cosmetics/categories"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/assets/cosmetics/categories"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/assets/cosmetics/categories"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
