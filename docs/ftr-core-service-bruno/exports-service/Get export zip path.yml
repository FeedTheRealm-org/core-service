info:
  name: Get export zip path
  type: http
  seq: 1
  tags:
    - exports-service

http:
  method: GET
  url: "{{baseUrl}}/exports/zip?app=ftr_game&version=v0.6.0&os=linux"
  params:
    - name: app
      value: ftr_game
      type: query
      description: App name
    - name: version
      value: v0.6.0
      type: query
      description: Version (vX.Y.Z)
    - name: os
      value: linux
      type: query
      description: OS name
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

