info:
  name: Update character info
  type: http
  seq: 2
  tags:
    - players-service

http:
  method: PATCH
  url: "{{baseUrl}}/player/character"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/player/character"
      method: PATCH
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/player/character"
      method: PATCH
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/player/character"
      method: PATCH
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 409 Response
    description: Conflict
    request:
      url: "{{baseUrl}}/player/character"
      method: PATCH
    response:
      status: 409
      statusText: Conflict
      body:
        type: text
        data: ""
