info:
  name: Get character metadata
  type: http
  seq: 1
  tags:
    - players-service

http:
  method: GET
  url: "{{baseUrl}}/player/character"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/player/character"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/player/character"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/player/character"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not Found
    request:
      url: "{{baseUrl}}/player/character"
      method: GET
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
