info:
  name: Refresh access token
  type: http
  seq: 6
  tags:
    - authentication-service

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh-token"
  headers:
    - name: Authorization
      value: ""
      description: Bearer <refresh_token>
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/auth/refresh-token"
      method: POST
      headers:
        - name: Authorization
          value: ""
          description: Bearer <refresh_token>
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
