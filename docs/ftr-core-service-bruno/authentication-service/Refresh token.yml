info:
  name: Refresh token
  type: http
  seq: 8
  tags:
    - authentication-service

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh-token"
  auth: inherit
  headers:
    - name: Authorization
      value: "Bearer {{refreshToken}}"
      enabled: true
  body:
    type: json
    data: |
      {
        "email": ""
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/auth/token/refresh"
      method: POST
      headers:
        - name: Authorization
          value: "Bearer {{refreshToken}}"
      body:
        type: json
        data: |
          {
            "email": ""
          }
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |
          {
            "access_token": "",
            "refresh_token": ""
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/auth/token/refresh"
      method: POST
      body:
        type: json
        data: |
          {
            "email": ""
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized - Invalid or expired refresh token
    request:
      url: "{{baseUrl}}/auth/token/refresh"
      method: POST
      headers:
        - name: Authorization
          value: "Bearer invalid_token"
      body:
        type: json
        data: |
          {
            "email": ""
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not Found
    request:
      url: "{{baseUrl}}/auth/token/refresh"
      method: POST
      headers:
        - name: Authorization
          value: "Bearer {{refreshToken}}"
      body:
        type: json
        data: |
          {
            "email": "notfound@example.com"
          }
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/auth/token/refresh"
      method: POST
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
