info:
  name: Reset password
  type: http
  seq: 11
  tags:
    - authentication-service

http:
  method: POST
  url: "{{baseUrl}}/auth/password/reset"
  body:
    type: json
    data: |-
      {
        "reset_token": "{{resetToken}}",
        "new_password": "MyNewPassword123!"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Password updated, all sessions revoked
    request:
      url: "{{baseUrl}}/auth/password/reset"
      method: POST
      body:
        type: json
        data: |-
          {
            "reset_token": "{{resetToken}}",
            "new_password": "MyNewPassword123!"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "data": {
              "success": true
            }
          }
  - name: 400 Response
    description: Bad Request - Invalid password format
    request:
      url: "{{baseUrl}}/auth/password/reset"
      method: POST
      body:
        type: json
        data: |-
          {
            "reset_token": "{{resetToken}}",
            "new_password": "weak"
          }
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized - Invalid or expired reset token
    request:
      url: "{{baseUrl}}/auth/password/reset"
      method: POST
      body:
        type: json
        data: |-
          {
            "reset_token": "invalidtoken",
            "new_password": "MyNewPassword123!"
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/auth/password/reset"
      method: POST
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
