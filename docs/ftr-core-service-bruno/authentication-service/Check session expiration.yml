info:
  name: Check session expiration
  type: http
  seq: 3
  tags:
    - authentication-service

http:
  method: GET
  url: "{{baseUrl}}/auth/check-session"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/auth/check-session"
      method: GET
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/auth/check-session"
      method: GET
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized
    request:
      url: "{{baseUrl}}/auth/check-session"
      method: GET
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/auth/check-session"
      method: GET
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
