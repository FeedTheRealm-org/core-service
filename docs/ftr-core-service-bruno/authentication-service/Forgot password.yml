info:
  name: Forgot password
  type: http
  seq: 9
  tags:
    - authentication-service

http:
  method: POST
  url: "{{baseUrl}}/auth/password/forgot"
  body:
    type: json
    data: |-
      {
        "email": "player@example.com"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - Always returned regardless of whether the account exists
    request:
      url: "{{baseUrl}}/auth/password/forgot"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "player@example.com"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "data": {
              "success": true
            }
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/auth/password/forgot"
      method: POST
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/auth/password/forgot"
      method: POST
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
