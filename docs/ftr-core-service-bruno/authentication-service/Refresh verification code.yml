info:
  name: Refresh verification code
  type: http
  seq: 5
  tags:
    - authentication-service

http:
  method: POST
  url: "{{baseUrl}}/auth/refresh"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 404 Response
    description: Not Found
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
    response:
      status: 404
      statusText: Not Found
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/auth/refresh"
      method: POST
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
