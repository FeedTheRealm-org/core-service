info:
  name: Verify password reset code
  type: http
  seq: 10
  tags:
    - authentication-service

http:
  method: POST
  url: "{{baseUrl}}/auth/password/verify-code"
  body:
    type: json
    data: |-
      {
        "email": "player@example.com",
        "code": "482193"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        response = res.getBody()
        resetToken = response.data["reset_token"]
        bru.setEnvVar("resetToken", resetToken)

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK - OTP verified, reset token issued
    request:
      url: "{{baseUrl}}/auth/password/verify-code"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "player@example.com",
            "code": "482193"
          }
    response:
      status: 200
      statusText: OK
      body:
        type: json
        data: |-
          {
            "data": {
              "reset_token": "a3f8c2..."
            }
          }
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/auth/password/verify-code"
      method: POST
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 401 Response
    description: Unauthorized - Invalid, expired, or max attempts reached
    request:
      url: "{{baseUrl}}/auth/password/verify-code"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "player@example.com",
            "code": "000000"
          }
    response:
      status: 401
      statusText: Unauthorized
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/auth/password/verify-code"
      method: POST
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
