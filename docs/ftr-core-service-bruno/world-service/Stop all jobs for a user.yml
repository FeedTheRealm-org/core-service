info:
  name: Stop all jobs for a user
  type: http
  seq: 12
  tags:
    - world-service
    - internal

http:
  method: GET
  url: "{{baseUrl}}/world/internal/users/:user_id/stop-jobs"
  params:
    - name: user_id
      value: ""
      type: path
      description: User UUID
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Acknowledge jobs stopped
    request:
      url: "{{baseUrl}}/world/internal/users/:user_id/stop-jobs"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
          description: User UUID
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/world/internal/users/:user_id/stop-jobs"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
          description: User UUID
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/world/internal/users/:user_id/stop-jobs"
      method: GET
      params:
        - name: user_id
          value: ""
          type: path
          description: User UUID
    response:
      status: 500
