info:
  name: Development DB reset
  type: http
  seq: 9
  tags:
    - world-service

http:
  method: DELETE
  url: "{{baseUrl}}/world/reset-database"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: Success reset
    request:
      url: "{{baseUrl}}/world/reset-database"
      method: DELETE
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/world/reset-database"
      method: DELETE
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""
