info:
  name: Create gem pack
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/payments/gems/packs"
  body:
    type: json
    data: |-
      {
        "name": "proof2",
        "gems": 10,
        "price": "9.99"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
