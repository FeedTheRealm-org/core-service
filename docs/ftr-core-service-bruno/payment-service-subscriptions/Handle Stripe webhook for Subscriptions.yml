  type: http
  seq: 8
  tags:
    - payment-service-subscriptions

http:
  method: POST
  url: "{{baseUrl}}/subscriptions/webhook/stripe"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/subscriptions/webhook/stripe"
      method: POST
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
  - name: 400 Response
    description: Bad Request
    request:
      url: "{{baseUrl}}/subscriptions/webhook/stripe"
      method: POST
    response:
      status: 400
      statusText: Bad Request
      body:
        type: text
        data: ""
  - name: 500 Response
    description: Internal Server Error
    request:
      url: "{{baseUrl}}/subscriptions/webhook/stripe"
      method: POST
    response:
      status: 500
      statusText: Internal Server Error
      body:
        type: text
        data: ""

docs: Processes Stripe webhook events for subscriptions changes/cancellations.
