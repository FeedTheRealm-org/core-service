coverage:
  status:
    project:
      default:
        target: 75%
        threshold: 0%
        informational: false
    patch:
      default:
        target: 0%
        informational: true
        enabled: true

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
  hide_project_coverage: false
