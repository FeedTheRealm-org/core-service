basePath: /
definitions:
  dtos.AddCosmeticCategoryRequest:
    properties:
      category_name:
        type: string
    required:
    - category_name
    type: object
  dtos.CharacterInfoResponse:
    properties:
      category_sprites:
        additionalProperties:
          type: string
        type: object
      character_bio:
        type: string
      character_name:
        type: string
      created_at:
        type: string
      updated_at:
        type: string
    type: object
  dtos.CheckSessionResponseDTO:
    properties:
      message:
        type: string
    type: object
  dtos.CheckoutRequest:
    properties:
      cancel_url:
        type: string
      gem_pack_id:
        type: string
      success_url:
        type: string
    required:
    - cancel_url
    - gem_pack_id
    - success_url
    type: object
  dtos.CheckoutResponse:
    properties:
      checkout_url:
        type: string
    type: object
  dtos.CheckoutSessionRequest:
    properties:
      cancel_url:
        type: string
      slots:
        type: integer
      success_url:
        type: string
    required:
    - cancel_url
    - slots
    - success_url
    type: object
  dtos.ConsumeWorldJoinTokenRequest:
    properties:
      token_id:
        type: string
    required:
    - token_id
    type: object
  dtos.ConsumeWorldJoinTokenResponse:
    properties:
      user_id:
        type: string
      world_id:
        type: string
    type: object
  dtos.CosmeticCategoryListResponse:
    properties:
      category_list:
        items:
          $ref: '#/definitions/dtos.CosmeticCategoryResponse'
        type: array
    type: object
  dtos.CosmeticCategoryResponse:
    properties:
      category_id:
        type: string
      category_name:
        type: string
    type: object
  dtos.CosmeticResponse:
    properties:
      cosmetic_id:
        type: string
      cosmetic_url:
        type: string
    type: object
  dtos.CosmeticsListResponse:
    properties:
      cosmetics_list:
        items:
          $ref: '#/definitions/dtos.CosmeticResponse'
        type: array
      total_count:
        type: integer
    type: object
  dtos.CreateAccountRequestDTO:
    properties:
      email:
        type: string
      is_admin:
        type: boolean
      password:
        type: string
    type: object
  dtos.CreateAccountResponseDTO:
    properties:
      email:
        type: string
    type: object
  dtos.CreateGemPackRequest:
    properties:
      gems:
        type: integer
      name:
        type: string
      price:
        type: number
    required:
    - gems
    - name
    - price
    type: object
  dtos.CreatorBalanceResponse:
    properties:
      balance:
        type: number
      user_id:
        type: string
    type: object
  dtos.ErrorResponse:
    properties:
      detail:
        type: string
      instance:
        type: string
      status:
        type: integer
      title:
        type: string
      type:
        type: string
    type: object
  dtos.GemBalanceResponse:
    properties:
      gems:
        type: integer
      user_id:
        type: string
    type: object
  dtos.GemPackDeletedResponse:
    properties:
      id:
        type: string
    type: object
  dtos.GemPackResponse:
    properties:
      created_at:
        type: string
      gems:
        type: integer
      id:
        type: string
      name:
        type: string
      price:
        type: number
      updated_at:
        type: string
    type: object
  dtos.InternalCosmeticResponse:
    properties:
      cosmetic_id:
        type: string
      cosmetic_price:
        type: number
      created_by:
        type: string
    type: object
  dtos.InternalPurchaseCosmeticForUserRequest:
    properties:
      cosmetic_id:
        type: string
    required:
    - cosmetic_id
    type: object
  dtos.InternalPurchaseCosmeticForUserResponse:
    properties:
      cosmetic_id:
        type: string
      user_id:
        type: string
    type: object
  dtos.InternalSlotsCheckResponse:
    properties:
      allowed:
        type: boolean
      free_slots:
        type: integer
    type: object
  dtos.InternalUpdateUsedSlotsRequest:
    properties:
      are_used:
        type: boolean
      slots:
        type: integer
    required:
    - slots
    type: object
  dtos.IssueWorldJoinTokenRequest:
    properties:
      world_id:
        type: string
    required:
    - world_id
    type: object
  dtos.IssueWorldJoinTokenResponse:
    properties:
      expires_at:
        type: string
      token_id:
        type: string
    type: object
  dtos.ItemListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/dtos.ItemResponse'
        type: array
    type: object
  dtos.ItemResponse:
    properties:
      created_at:
        type: string
      id:
        type: string
      updated_at:
        type: string
      url:
        type: string
    type: object
  dtos.LoginAccountRequestDTO:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  dtos.LoginAccountResponseDTO:
    properties:
      access_token:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
      updated_at:
        type: string
    type: object
  dtos.ModelResponse:
    properties:
      model_id:
        type: string
      url:
        type: string
    type: object
  dtos.ModelsListResponse:
    properties:
      models:
        items:
          $ref: '#/definitions/dtos.ModelResponse'
        type: array
      world_id:
        type: string
    required:
    - world_id
    type: object
  dtos.PatchCharacterInfoRequest:
    properties:
      category_sprites:
        additionalProperties:
          type: string
        type: object
      character_bio:
        type: string
      character_name:
        type: string
    type: object
  dtos.PricingInfoResponse:
    properties:
      next_billing_date:
        type: string
      price_per_slot:
        type: number
    type: object
  dtos.PublishZoneRequest:
    properties:
      data: {}
    type: object
  dtos.RefreshVerificationRequestDTO:
    properties:
      email:
        type: string
    type: object
  dtos.RefreshVerificationResponseDTO:
    properties:
      email:
        type: string
    type: object
  dtos.SubscriptionStatusResponse:
    properties:
      amount_due:
        type: number
      next_billing_date:
        type: string
      slots:
        type: integer
      status:
        type: string
      used_slots:
        type: integer
    type: object
  dtos.UpdateCreateableDataRequest:
    properties:
      createable_data: {}
    type: object
  dtos.UpdateGemBalanceRequest:
    properties:
      gems:
        type: integer
    required:
    - gems
    type: object
  dtos.UpdateGemPackRequest:
    properties:
      gems:
        type: integer
      name:
        type: string
      price:
        type: number
    type: object
  dtos.UpdateSubscriptionRequest:
    properties:
      slots:
        type: integer
    required:
    - slots
    type: object
  dtos.VerifyAccountRequestDTO:
    properties:
      code:
        type: string
      email:
        type: string
    type: object
  dtos.VerifyAccountResponseDTO:
    properties:
      email:
        type: string
      verified:
        type: boolean
    type: object
  dtos.WebhookResponse:
    type: object
  dtos.WorldAddressResponse:
    properties:
      ip:
        type: string
      port:
        type: integer
    type: object
  dtos.WorldMetadata:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      zones:
        items:
          $ref: '#/definitions/dtos.WorldZoneMetadata'
        type: array
    type: object
  dtos.WorldRequest:
    properties:
      createable_data: {}
      data: {}
      description:
        type: string
      file_name:
        type: string
    type: object
  dtos.WorldResponse:
    properties:
      createable_data:
        type: string
      created_at:
        type: string
      data:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
      zones:
        items:
          $ref: '#/definitions/dtos.WorldZoneMetadata'
        type: array
    type: object
  dtos.WorldZoneMetadata:
    properties:
      is_active:
        type: boolean
      zone_id:
        type: integer
    type: object
  dtos.WorldZoneResponse:
    properties:
      is_active:
        type: boolean
      world_id:
        type: string
      zone_data:
        type: string
      zone_id:
        type: integer
    type: object
  dtos.WorldZonesResponse:
    properties:
      world_id:
        type: string
      zones:
        items:
          $ref: '#/definitions/dtos.WorldZoneMetadata'
        type: array
    type: object
  dtos.WorldsListResponse:
    properties:
      amount:
        type: integer
      limit:
        type: integer
      offset:
        type: integer
      worlds:
        items:
          $ref: '#/definitions/dtos.WorldMetadata'
        type: array
    type: object
info:
  contact: {}
  description: |-
    This service manages all backend interactions for the feed the realm clients.

    ⚠️ NOTE: All 2xx responses are wrapped in a 'Data envelope'.
    Example: { "data": { "id": "123", "name": "Alice" } }
  title: FeedTheRealm Core Service API
  version: 0.1.0
paths:
  /assets/cosmetics/{id}:
    delete:
      description: Delete a specific cosmetic by ID (requires ownership)
      parameters:
      - description: Cosmetic UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/dtos.CosmeticResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete cosmetic
      tags:
      - assets-service
    get:
      consumes:
      - application/json
      description: Retrieves a single cosmetic item by its ID.
      parameters:
      - description: Cosmetic UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.CosmeticResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cosmetic by ID
      tags:
      - assets-service
  /assets/cosmetics/categories:
    get:
      consumes:
      - application/json
      description: Retrieves a list of all cosmetic categories.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.CosmeticCategoryListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cosmetics categories
      tags:
      - assets-service
    post:
      consumes:
      - application/json
      description: Creates a new cosmetic category globally.
      parameters:
      - description: Category data
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/dtos.AddCosmeticCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.CosmeticCategoryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Adds a new cosmetic category
      tags:
      - assets-service
  /assets/cosmetics/categories/{id}:
    get:
      consumes:
      - application/json
      description: Retrieves a list of cosmetics that belong to a specific category
        ID.
      parameters:
      - description: Category UUID
        in: path
        name: id
        required: true
        type: string
      - default: 0
        description: Pagination offset
        in: query
        name: offset
        type: integer
      - default: 24
        description: Pagination limit
        in: query
        name: limit
        type: integer
      - default: "null"
        description: World UUID
        in: query
        name: world_id
        type: string
      - default: "null"
        description: Player UUID
        in: query
        name: player_id
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.CosmeticsListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cosmetics by category
      tags:
      - assets-service
    put:
      consumes:
      - multipart/form-data
      description: Upload a cosmetic form-data payload containing category ID and
        cosmetic file.
      parameters:
      - description: Category UUID
        in: path
        name: category_id
        required: true
        type: string
      - description: World UUID
        in: formData
        name: world_id
        required: true
        type: string
      - description: Cosmetic price (must be > 0)
        in: formData
        name: price
        required: true
        type: number
      - description: Cosmetic File
        in: formData
        name: sprite
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.CosmeticResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload cosmetic data
      tags:
      - assets-service
  /assets/cosmetics/categories/{id}/sprites/{sprite_id}:
    put:
      description: Creates a cosmetic entry in the target category using the URL from
        an existing sprite ID.
      parameters:
      - description: Category UUID
        in: path
        name: category_id
        required: true
        type: string
      - description: Existing Sprite UUID
        in: path
        name: sprite_id
        required: true
        type: string
      - description: World UUID
        in: formData
        name: world_id
        required: true
        type: string
      - description: Cosmetic price (must be > 0)
        in: formData
        name: price
        required: true
        type: number
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.CosmeticResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Link existing cosmetic by ID
      tags:
      - assets-service
  /assets/cosmetics/worlds/{world_id}:
    get:
      consumes:
      - application/json
      description: Retrieves a list of cosmetics that belong to a specific world ID.
      parameters:
      - description: World UUID
        in: path
        name: world_id
        required: true
        type: string
      - default: 0
        description: Pagination offset
        in: query
        name: offset
        type: integer
      - default: 24
        description: Pagination limit
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.CosmeticsListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cosmetics by world
      tags:
      - assets-service
  /assets/internal/cosmetics/{cosmetic_id}:
    get:
      consumes:
      - application/json
      description: Retrieves a single cosmetic item by its ID. Intended for internal
        service communication.
      parameters:
      - description: Cosmetic UUID
        in: path
        name: cosmetic_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.InternalCosmeticResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get cosmetic by ID (Internal)
      tags:
      - assets-service-internal
  /assets/internal/users/{user_id}/cosmetics:
    post:
      consumes:
      - application/json
      description: Records a cosmetic purchase for a specific user. Intended for internal
        service communication.
      parameters:
      - description: User UUID
        in: path
        name: user_id
        required: true
        type: string
      - description: Purchase Details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dtos.InternalPurchaseCosmeticForUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.InternalPurchaseCosmeticForUserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Purchase cosmetic for user (Internal)
      tags:
      - assets-service-internal
  /assets/items/{id}:
    delete:
      description: Delete a specific item by ID (requires ownership)
      parameters:
      - description: Item UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            $ref: '#/definitions/dtos.ItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete item
      tags:
      - assets-service
    get:
      consumes:
      - application/json
      description: Retrieves a single item item by its ID.
      parameters:
      - description: Item UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.ItemResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get item by ID
      tags:
      - assets-service
  /assets/items/world/{world_id}:
    get:
      consumes:
      - application/json
      description: Retrieves an items list specific to a world ID.
      parameters:
      - description: World UUID
        in: path
        name: world_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.ItemListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get items by world
      tags:
      - assets-service
    put:
      consumes:
      - multipart/form-data
      description: Upload item IDs alongside sprite files mapping to a world.
      parameters:
      - description: World UUID
        in: path
        name: world_id
        required: true
        type: string
      - collectionFormat: csv
        description: Array of exact item IDs
        in: formData
        items:
          type: string
        name: ids
        required: true
        type: array
      - description: Muti-part chunk array of files
        in: formData
        name: sprites
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.ItemListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload items and sprites
      tags:
      - assets-service
  /assets/models/world/{world_id}:
    get:
      consumes:
      - application/json
      description: Retrieve the metadata models available in a given world id.
      parameters:
      - description: World UUID
        in: path
        name: world_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dtos.ModelsListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get 3D models list
      tags:
      - assets-service
    put:
      consumes:
      - multipart/form-data
      description: Submit multiple custom models bounded to a specific world.
      parameters:
      - description: World UUID
        in: path
        name: world_id
        required: true
        type: string
      - description: Multipart upload array for model bindings
        in: formData
        name: models
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dtos.ModelsListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dtos.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Upload batch 3D models
      tags:
      - assets-service
  /auth:
    get:
      description: Serves the HTML form for admin login.
      produces:
      - text/html
      responses:
        "200":
          description: HTML form
          schema:
            type: string
      summary: Admin login page
      tags:
      - authentication-service
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Processes admin login form submission, sets a JWT cookie, and redirects
        to Swagger UI.
      parameters:
      - description: Admin Email
        in: formData
        name: email
        required: true
        type: string
      - description: Admin Password
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Fallback on error
